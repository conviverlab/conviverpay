<title>Conviver Pay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#22c55e;--accent-deep:#16a34a;--accent-soft:rgba(34,197,94,.12);
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--pink:#ec4899;--teal:#14b8a6;
  --bg:#f4f6f8;--sidebar:#ffffff;--panel:#ffffff;--panel-2:#f8fafc;--col-bg:#f1f4f7;
  --line:#e4e9ef;--line-soft:#eef2f6;--ink:#0f172a;--ink-soft:#475569;--ink-dim:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.04);
  --shadow-lg:0 10px 40px rgba(15,23,42,.12);--card-grad:#ffffff;--card:#ffffff;--ring:0 0 0 3px rgba(34,197,94,.16);
}
html[data-theme="dark"]{
  --bg:#0a0e14;--sidebar:#0d121a;--panel:#121821;--panel-2:#161d27;--col-bg:#0f151d;
  --line:#1e2733;--line-soft:#1a222d;--ink:#e8eef4;--ink-soft:#94a3b8;--ink-dim:#5b6776;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
  --shadow-lg:0 20px 60px rgba(0,0,0,.5);--card-grad:linear-gradient(165deg,#161d27,#121821);--card:#161d27;--ring:0 0 0 3px rgba(34,197,94,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;display:flex;min-height:100vh;transition:background .3s,color .3s}
aside{width:236px;flex:0 0 236px;background:var(--sidebar);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:background .3s,border .3s,width .25s ease,flex-basis .25s ease}
aside.collapsed{width:0;flex:0 0 0;border-right:none;overflow:hidden}
aside.collapsed>*{opacity:0;pointer-events:none}
#sidebarToggle{position:fixed;top:18px;left:236px;z-index:50;width:28px;height:28px;border-radius:0 8px 8px 0;
  background:var(--panel);border:1px solid var(--line);border-left:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink-dim);transition:left .25s ease;font-size:13px}
body.sidebar-collapsed #sidebarToggle{left:0}
#sidebarToggle:hover{color:var(--accent)}
.logo{padding:24px 22px 22px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line-soft)}
.logo .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-deep));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;box-shadow:0 6px 16px var(--accent-soft)}
.logo .txt b{font-size:18px;font-weight:800;letter-spacing:-.3px;color:var(--accent)}
.logo .txt span{display:block;font-size:11px;color:var(--ink-dim);font-weight:500;margin-top:1px}
nav{flex:1;padding:16px 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;
  color:var(--ink-soft);font-weight:600;font-size:14px;transition:.15s;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item svg{width:19px;height:19px;flex:0 0 19px;stroke:currentColor;fill:none;stroke-width:2}
.nav-item:hover{background:var(--panel-2);color:var(--ink)}
.nav-item.active{background:var(--accent-soft);color:var(--accent-deep);box-shadow:inset 3px 0 0 var(--accent)}
html[data-theme="dark"] .nav-item.active{color:var(--accent)}
.nav-item .badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--col-bg);color:var(--ink-soft);padding:1px 8px;border-radius:20px}
.nav-item.active .badge{background:var(--accent);color:#fff}
.nav-item .badge.alert{background:var(--red);color:#fff}
.nav-sep{height:1px;background:var(--line-soft);margin:10px 6px}
.side-data{padding:12px;border-top:1px solid var(--line-soft);display:flex;flex-direction:column;gap:7px}
.data-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 13px;border-radius:9px;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink-soft);font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;transition:.15s}
.data-btn:hover{color:var(--ink);border-color:var(--ink-dim)}
.data-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex:0 0 15px}
.side-foot{padding:12px;border-top:1px solid var(--line-soft)}
.theme-btn{display:flex;align-items:center;gap:11px;width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink-soft);font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;transition:.15s}
.theme-btn:hover{color:var(--ink);border-color:var(--ink-dim)}
.theme-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
main{flex:1;min-width:0;display:flex;flex-direction:column}
.head{display:flex;align-items:center;justify-content:space-between;padding:24px 30px 16px;gap:16px;flex-wrap:wrap}
.head .h-title h2{font-size:23px;font-weight:800;letter-spacing:-.4px}
.head .h-title p{font-size:13px;color:var(--ink-dim);margin-top:2px}
.head .tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.savetag{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);
  background:var(--panel);border:1px solid var(--line);padding:8px 13px;border-radius:9px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.dot.off{background:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.search{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 13px;
  color:var(--ink);font-family:inherit;font-size:13.5px;width:190px}
.search::placeholder{color:var(--ink-dim)}
.search:focus{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
.btn{border:none;border-radius:9px;padding:10px 17px;font-family:inherit;font-weight:700;font-size:13.5px;cursor:pointer;
  transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:disabled{opacity:.6;cursor:wait}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff}
.btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 8px 22px rgba(34,197,94,.32)}
.btn-ghost{background:var(--panel);color:var(--ink-soft);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--ink)}
.cl-mini{padding:5px 10px;font-size:11.5px;font-weight:600;border-radius:7px;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:.15s}
.cl-mini:hover{color:var(--ink);border-color:var(--accent)}
.filterbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:0 30px 18px}
.fchip{padding:7px 13px;font-size:12.5px;font-weight:600;border-radius:8px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:.15s}
.fchip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fsel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 11px;color:var(--ink);font-family:inherit;font-size:12.5px}
.fsel:focus{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
.fclear{font-size:12px;color:var(--ink-dim);cursor:pointer;text-decoration:underline;margin-left:4px}
.setup-banner{background:rgba(245,158,11,.12);border:1px solid var(--amber);border-radius:12px;padding:16px 20px;
  margin:20px 30px;display:flex;gap:13px;align-items:flex-start}
.setup-banner .ico{font-size:20px}
.setup-banner h3{font-size:14px;margin-bottom:4px;color:var(--amber)}
.setup-banner p{font-size:12.5px;color:var(--ink-soft);line-height:1.6}
.setup-banner code{background:var(--panel-2);padding:1px 6px;border-radius:5px;font-size:11.5px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:0 30px 22px}
.scard{background:var(--card-grad);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.scard .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim)}
.scard .val{font-size:26px;font-weight:800;margin-top:8px;letter-spacing:-.5px}
.scard .sub{font-size:12px;color:var(--ink-dim);margin-top:3px}
.scard.accent .val{color:var(--accent-deep)}
html[data-theme="dark"] .scard.accent .val{color:var(--accent)}
.scard.warn .val{color:var(--amber)}
.scard.danger .val{color:var(--red)}
.board-wrap{padding:0 30px 50px;flex:1}
.board{display:flex;gap:15px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.board::-webkit-scrollbar{height:0}
.board-scroll{position:sticky;bottom:0;left:0;z-index:20;display:none;overflow-x:auto;overflow-y:hidden;height:15px;margin-top:2px;background:var(--bg);border-top:1px solid var(--line-soft)}
.board-scroll>div{height:1px}
.col{flex:0 0 280px;background:var(--col-bg);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:120px;transition:.15s}
.col.drag-over{border-color:var(--accent);background:var(--accent-soft)}
.col-head{display:flex;align-items:center;gap:9px;padding:5px 6px 13px}
.col-head .bar{width:4px;height:15px;border-radius:4px}
.col-head h3{font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--ink-soft)}
.col-head .num{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--ink-dim);background:var(--panel);padding:1px 9px;border-radius:20px}
.card{background:var(--card-grad);border:1px solid var(--line);border-radius:11px;padding:13px 14px 13px 16px;margin-bottom:10px;
  cursor:grab;transition:.15s;position:relative;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--ink-dim)}
.card.dragging{opacity:.4;cursor:grabbing}
.card.atencao{background:#fff8e1;border-color:#f0c000}
html[data-theme="dark"] .card.atencao{background:#3a3320;border-color:#9c8420}
.card .pr{position:absolute;top:0;left:0;width:5px;height:100%;border-radius:11px 0 0 11px}
.card h4{font-size:14.5px;font-weight:700;line-height:1.3;margin-bottom:7px}
.card .meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.chip{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--panel-2);color:var(--ink-soft);border:1px solid var(--line);display:inline-flex;align-items:center;gap:5px}
.chip.danger{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.3)}
.chip.warn{background:rgba(240,192,0,.15);color:#8a6d00;border-color:#f0c000}
html[data-theme="dark"] .chip.warn{color:#f0c000}
.chip.aprov{background:rgba(59,130,246,.12);color:var(--blue);border-color:rgba(59,130,246,.3)}
.chip .cdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.chip.val{color:var(--accent-deep);border-color:var(--accent);background:var(--accent-soft)}
html[data-theme="dark"] .chip.val{color:var(--accent)}
.chip.city{color:var(--blue);border-color:rgba(59,130,246,.25)}
.chip.todo{color:var(--purple);border-color:rgba(139,92,246,.3)}
.chip.todo.done{color:var(--accent-deep);border-color:var(--accent);background:var(--accent-soft)}
html[data-theme="dark"] .chip.todo.done{color:var(--accent)}
.progress{height:4px;background:var(--col-bg);border-radius:4px;margin:2px 0 0;overflow:hidden}
.progress span{display:block;height:100%;background:var(--accent);transition:width .3s}
.card .next{font-size:12px;color:var(--ink-soft);background:var(--panel-2);border-radius:8px;padding:7px 9px;margin:8px 0 0;
  display:flex;gap:7px;align-items:flex-start;line-height:1.35}
.card .next b{color:var(--accent-deep);font-weight:700;flex:0 0 auto;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding-top:1px}
html[data-theme="dark"] .card .next b{color:var(--accent)}
.card .foot{display:flex;align-items:center;gap:9px;margin-top:10px;font-size:11.5px;color:var(--ink-dim)}
.card .card-dup{margin-left:auto;opacity:0;font-size:13px;background:none;border:1px solid var(--line);border-radius:6px;padding:1px 6px;cursor:pointer;color:var(--ink-dim);transition:.15s;flex-shrink:0;line-height:1.4}
.card:hover .card-dup{opacity:.7}
.card .card-dup:hover{opacity:1;background:var(--panel-2);color:var(--ink);border-color:var(--ink-dim)}
.card .foot .who{display:flex;align-items:center;gap:5px}
.card .foot .avatar{width:18px;height:18px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;font-size:9px;font-weight:800;color:var(--accent-deep)}
html[data-theme="dark"] .card .foot .avatar{color:var(--accent)}
.card .late{color:var(--red);font-weight:700}
.empty-col{text-align:center;color:var(--ink-dim);font-size:12px;padding:18px 0;font-style:italic}
/* PAGADORIA */
.pagwrap{padding:0 30px 50px}
.pag-upload{background:var(--card-grad);border:1px dashed var(--line);border-radius:13px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.pag-upload .pu-txt{flex:1;min-width:200px}
.pag-upload .pu-txt b{font-size:14px;font-weight:700;display:block;margin-bottom:2px}
.pag-upload .pu-txt span{font-size:12.5px;color:var(--ink-dim)}
.pag-grp{margin-bottom:22px}
.pag-grp-head{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pag-grp-head .gswatch{width:5px;height:18px;border-radius:4px}
.pag-grp-head h3{font-size:14px;font-weight:800}
.pag-grp-head .gcount{font-size:12px;font-weight:700;color:var(--ink-dim);background:var(--panel-2);padding:2px 10px;border-radius:20px}
.pag-grp-head .gval{margin-left:auto;font-size:13px;font-weight:700;color:var(--ink-soft)}
.pag-row{background:var(--card-grad);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);border-left:5px solid var(--ink-dim);display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.pag-row.pend{border-left-color:var(--amber)}
.pag-row.receb{border-left-color:var(--accent)}
.pag-row.atencao{border-left-color:var(--red);background:#fdecec}
html[data-theme="dark"] .pag-row.atencao{background:#3a2424}
.pag-row .pr-main{flex:1;min-width:220px}
.pag-row .pr-main h4{font-size:14px;font-weight:700;line-height:1.3}
.pag-row .pr-main .pr-desc{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.35}
.pag-row .pr-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pag-row .pr-right{text-align:right;min-width:150px}
.pag-row .pr-val{font-size:15px;font-weight:800}
.pag-badge{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:3px 9px;border-radius:20px;color:#fff;display:inline-block;margin-top:5px}
.pag-badge.pend{background:var(--amber)}
.pag-badge.receb{background:var(--accent)}
.pag-badge.match{background:var(--blue)}
.pag-badge.nomatch{background:var(--ink-dim)}
.oc-empty{text-align:center;color:var(--ink-dim);font-size:13px;font-style:italic;padding:30px}
/* SETTINGS */
.settings{padding:0 30px 50px;max-width:900px}
.set-card{background:var(--card-grad);border:1px solid var(--line);border-radius:14px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:18px}
.set-card h3{font-size:16px;font-weight:800;margin-bottom:4px}
.set-card p.desc{font-size:13px;color:var(--ink-dim);margin-bottom:18px}
.emp-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--line);border-radius:10px;margin-bottom:9px}
.emp-row .swatch{width:26px;height:26px;border-radius:7px;flex:0 0 26px;border:2px solid rgba(0,0,0,.06)}
.emp-row .emp-info{flex:1}
.emp-row .emp-info b{font-size:14px;font-weight:700}
.emp-row .emp-info span{font-size:12px;color:var(--ink-dim);display:block;margin-top:1px}
.emp-row .emp-del{background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;transition:.15s}
.emp-row .emp-del:hover{color:var(--red);border-color:var(--red)}
.emp-form{display:grid;grid-template-columns:1.4fr 1fr 1fr auto auto;gap:10px;align-items:end;margin-top:16px;padding-top:18px;border-top:1px solid var(--line)}
.emp-form .field label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:5px}
.emp-form input{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);font-family:inherit;font-size:13px;width:100%}
.emp-form input:focus{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
.emp-form input[type=color]{padding:3px;height:38px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);display:none;
  align-items:flex-start;justify-content:center;z-index:50;padding:40px 20px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:680px;
  box-shadow:var(--shadow-lg);animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h2{font-size:18px;font-weight:800}
.modal-head .x{background:var(--panel-2);border:1px solid var(--line);color:var(--ink-soft);width:32px;height:32px;
  border-radius:9px;cursor:pointer;font-size:15px;transition:.15s}
.modal-head .x:hover{color:var(--ink)}
.modal-body{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.3px;text-transform:uppercase}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--line);border-radius:9px;
  padding:10px 12px;color:var(--ink);font-family:inherit;font-size:13.5px;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
.field textarea{resize:vertical;min-height:56px}
.section-div{grid-column:1/-1;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim);
  display:flex;align-items:center;gap:9px;margin-top:6px}
.section-div .ln{flex:1;height:1px;background:var(--line)}
.cnpj-row{grid-column:1/-1;display:flex;gap:8px;align-items:flex-end}
.cnpj-row .field{flex:1}
.cnpj-row .btn{flex:0 0 auto;height:38px}
.cnpj-err{grid-column:1/-1;font-size:12px;color:var(--red);margin-top:-6px}
.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.atencao-box{grid-column:1/-1;background:rgba(240,192,0,.12);border:1px solid #f0c000;border-radius:10px;padding:12px 14px;font-size:12.5px;color:#8a6d00;display:flex;gap:10px;align-items:flex-start}

// ===== Persistência: sincronização com Supabase =====
let _syncT=null,_syncing=false,_syncAgain=false,_dirty=false;
function persist(){
  if(!canPersist)return;
  _dirty=true;setSave(false);clearTimeout(_syncT);_syncT=setTimeout(runSync,150);
}
async function runSync(){
  if(_syncing){_syncAgain=true;return;}
  _syncing=true;
  try{await syncAll();_dirty=false;setSave(true);}
  catch(e){console.error('Sync:',e);toast('Erro ao salvar: '+(e&&e.message?e.message:e),true);setSave(false);}
  finally{_syncing=false;if(_syncAgain){_syncAgain=false;runSync();}}
}
async function refreshData(){
  if(_dirty||_syncing){if(!confirm('Há uma alteração sendo salva. Atualizar agora pode sobrescrever o que você acabou de mudar localmente. Continuar?'))return;}
  const btn=document.getElementById('refreshBtn');btn.disabled=true;btn.textContent='⟲ Atualizando…';
  try{await loadFromSupabase();checkPagamentoProgramadoExpirado();switchTab(current);toast('Dados atualizados ✓');}
  catch(e){toast('Erro ao atualizar: '+(e&&e.message?e.message:e),true);}
  finally{btn.disabled=false;btn.textContent='⟲ Atualizar';}
}
window.addEventListener('beforeunload',function(e){
  if(_dirty||_syncing){e.preventDefault();e.returnValue='Ainda há alterações sendo salvas. Aguarde alguns segundos.';return e.returnValue;}
});

const SB_COLS={
  coligadas:['id','num','razao','cnpj','pag_nome'],
  empreendimentos:['id','nome','cidade','estado','cor','coligada_id','coligada','ordem'],
  responsaveis:['id','nome'],
  lancamentos:['id','titulo','empreendimento','numero_oc','numero_atividade','fornecedor','nome_fantasia','cnpj','cnpj_norm',
    'endereco','numero_endereco','bairro','forn_cidade','forn_estado','cep','telefone','email','banco','agencia','conta','pix',
    'valor','forma_pagamento','parcela_atual','total_parcelas','prioridade','responsavel','data_solicitacao','data_limite',
    'status','requer_atencao','requer_atencao_motivo','aguardando_aprovacao_de','observacoes','checklist']
};
function cleanRow(table,row){
  const cols=SB_COLS[table];const out={};
  cols.forEach(c=>{
    let v=row[c];if(v===undefined)v=null;
    if((c==='data_limite'||c==='data_solicitacao')&&(v===''||v==null))v=null;
    if(c==='requer_atencao')v=(v===true);
    if(c==='checklist'&&!Array.isArray(v))v=[];
    out[c]=v;
  });
  if(table==='lancamentos'&&'cnpj' in out)out.cnpj_norm=String(out.cnpj||'').replace(/\D/g,'');
  return out;
}
async function upsertColl(table,rows,idField){
  const clean=(rows||[]).map(r=>cleanRow(table,r));
  if(clean.length){const{error}=await sb.from(table).upsert(clean,{onConflict:idField});if(error)throw new Error(table+': '+error.message);}
  const{data:remote,error:e2}=await sb.from(table).select(idField);if(e2)throw new Error(table+' (read): '+e2.message);
  const localIds=new Set(clean.map(r=>String(r[idField])));
  const toDelete=(remote||[]).map(r=>r[idField]).filter(id=>!localIds.has(String(id)));
  if(toDelete.length){const{error:e3}=await sb.from(table).delete().in(idField,toDelete);if(e3)throw new Error(table+' (delete): '+e3.message);}
}
async function syncPagadoria(){
  const rows=(DATA.pagadoria||[]).map(p=>({oc:p.oc,atividade:p.atividade,usuario:p.usuario||null,data:p.data||null,
    status_atendimento:p.status_atendimento||null,status_movimento:p.status_movimento||null,coligada:p.coligada||null,
    empreendimento:p.empreendimento||null,fornecedor:p.fornecedor||null,cnpj:p.cnpj||null,historico:p.historico||null,
    dados_pgto:p.dados_pgto||null,responsavel:p.responsavel||null,valor:Number(p.valor)||0}));
  if(!rows.length)return;
  const{error}=await sb.from('pagadoria').upsert(rows,{onConflict:'oc,atividade'});
  if(error)throw new Error('pagadoria: '+error.message);
}
async function syncAll(){
  if(!SB_CONFIGURED)return;
  await upsertColl('coligadas',DATA.coligadas,'id');
  await upsertColl('empreendimentos',DATA.empreendimentos,'id');
  await upsertColl('responsaveis',DATA.responsaveis,'id');
  await upsertColl('lancamentos',DATA.lancamentos,'id');
  await syncPagadoria();
}

  catch(e){console.error(e);}
}

function viewLancShell(){

function isLate(dateStr,status){if(!dateStr||status==='pago'||status==='cancelado')return false;
  return new Date(dateStr+'T00:00:00')<new Date(new Date().toDateString());}
function renderLanc(){
  updateCounts();
  const board=document.getElementById('board');if(!board)return;
  const q=(document.getElementById('search').value||'').toLowerCase();
  board.innerHTML='';
  LANC_COLUMNS.forEach((col,i)=>{
    let items=(DATA.lancamentos||[]).filter(it=>(it.status||LANC_COLUMNS[0])===col);
    if(q)items=items.filter(it=>JSON.stringify(it).toLowerCase().includes(q));
    if(filters.emp)items=items.filter(it=>it.empreendimento===filters.emp);
    const colEl=document.createElement('div');colEl.className='col';colEl.dataset.col=col;
    colEl.ondragover=e=>{e.preventDefault();colEl.classList.add('drag-over')};
    colEl.ondragleave=()=>colEl.classList.remove('drag-over');
    colEl.ondrop=e=>{e.preventDefault();colEl.classList.remove('drag-over');dropLanc(col)};
    const color=COLORS[i%COLORS.length];
    colEl.innerHTML='<div class="col-head"><span class="bar" style="background:'+color+'"></span><h3>'+LANC_LABELS[col]+'</h3><span class="num">'+items.length+'</span></div>';
    if(!items.length)colEl.innerHTML+='<div class="empty-col">vazio</div>';
    items.forEach(it=>colEl.appendChild(lancCardEl(it)));

  });

function syncBoardScrollbar(){
  const b=document.getElementById('board'),bar=document.getElementById('boardScroll');
  if(!b||!bar)return;
  bar.firstElementChild.style.width=b.scrollWidth+'px';
  bar.style.display=(b.scrollWidth>b.clientWidth+2)?'block':'none';
}
let dragId=null;
function lancCardEl(it){
  const el=document.createElement('div');
  el.className='card'+(it.requer_atencao?' atencao':'');el.draggable=true;
  el.ondragstart=()=>{el.classList.add('dragging');dragId=it.id};
  el.ondragend=()=>el.classList.remove('dragging');
  el.onclick=()=>openLanc(it.id);
  const title=it.titulo||'(sem título)';
  const barColor=it.empreendimento?empColor(it.empreendimento):(PRIOR[it.prioridade]||'var(--ink-dim)');
  let chips='';
  if(it.requer_atencao)chips+='<span class="chip warn">⚠ Requer atenção</span>';
  if(it.aguardando_aprovacao_de)chips+='<span class="chip aprov">⏳ Aguardando: '+esc(it.aguardando_aprovacao_de)+'</span>';
  if(it.empreendimento)chips+='<span class="chip"><span class="cdot" style="background:'+empColor(it.empreendimento)+'"></span>'+esc(it.empreendimento)+'</span>';
  if(it.numero_oc)chips+='<span class="chip">OC '+esc(it.numero_oc)+(it.numero_atividade?'/'+esc(it.numero_atividade):'')+'</span>';
  if(it.valor)chips+='<span class="chip val">R$ '+fmtMoney(it.valor)+'</span>';
  if(it.total_parcelas)chips+='<span class="chip">'+(it.parcela_atual||1)+'/'+it.total_parcelas+'</span>';
  const cl=it.checklist||[];const doneN=cl.filter(c=>c.done).length;
  if(cl.length)chips+='<span class="chip todo'+(doneN===cl.length?' done':'')+'">✓ '+doneN+'/'+cl.length+'</span>';
  const late=isLate(it.data_limite,it.status);
  const pct=cl.length?Math.round(doneN/cl.length*100):0;
  const prox=nextAction(it);
  el.innerHTML='<span class="pr" style="background:'+barColor+'"></span>'+
    '<h4>'+esc(title)+(it.fornecedor?' — '+esc(it.fornecedor):'')+'</h4>'+(chips?'<div class="meta">'+chips+'</div>':'')+
    (cl.length?'<div class="progress"><span style="width:'+pct+'%"></span></div>':'')+
    (prox?'<div class="next"><b>Próx</b><span>'+esc(prox)+'</span></div>':'')+
    '<div class="foot">'+
    (it.responsavel?'<span class="who"><span class="avatar">'+initials(it.responsavel)+'</span>'+esc(it.responsavel)+'</span>':'')+
    (it.data_limite?'<span class="'+(late?'late':'')+'">'+(late?'⚠ ':'📆 ')+fmtDate(it.data_limite)+'</span>':'')+
    '<button class="card-dup" title="Duplicar" onclick="event.stopPropagation();duplicateLanc(\''+it.id+'\')">⧉</button>'+
    '</div>';
  return el;
}
function dropLanc(newStatus){
  if(!dragId)return;const it=DATA.lancamentos.find(x=>x.id===dragId);
  if(!it||it.status===newStatus){dragId=null;return;}
  const de=it.status;it.status=newStatus;persist();render();toast('Status atualizado ✓');
  logHistorico(it.id,de,newStatus,'manual','Movido manualmente no quadro');
  dragId=null;
}
function duplicateLanc(id){
  const orig=DATA.lancamentos.find(x=>x.id===id);if(!orig)return;
  const copy=JSON.parse(JSON.stringify(orig));
  copy.id=uid('lan');copy.created_at=new Date().toISOString();copy.status=LANC_COLUMNS[0];

function fmtDateTime(iso){if(!iso)return'';const d=new Date(iso);if(isNaN(d))return iso;

function maskCNPJ(v){
  return v.replace(/\D/g,'').slice(0,14)
    .replace(/^(\d{2})(\d)/,'$1.$2')
    .replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3')
    .replace(/\.(\d{3})(\d)/,'.$1/$2')
    .replace(/(\d{4})(\d)/,'$1-$2');
}
function maskMoney(v){
  const digits=(v||'').replace(/\D/g,'');
  if(!digits)return'';
  return (parseInt(digits,10)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function unmaskMoney(v){
  if(!v)return 0;
  return parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0;
}
function moneyToInputStr(v){
  return v?Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
}
function addBusinessDays(dateStr,days){
  const d=new Date(dateStr+'T00:00:00');let added=0;
  while(added<days){
    d.setDate(d.getDate()+1);
    const dow=d.getDay();
    if(dow!==0&&dow!==6)added++;
  }
  const pad=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
async function consultarCNPJ(){
  const inp=document.getElementById('lCnpj');const raw=(inp.value||'').replace(/\D/g,'');
  const btn=document.getElementById('cnpjBtn');const errEl=document.getElementById('cnpjErr');
  errEl.textContent='';
  if(raw.length!==14){errEl.textContent='Digite um CNPJ válido (14 dígitos).';return;}
  const origLabel=btn.textContent;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Consultando…';
  try{
    const res=await fetch('https://publica.cnpj.ws/cnpj/'+raw);
    if(res.status===429)throw new Error('Limite de 3 consultas por minuto da API pública atingido. Aguarde um minuto e tente novamente.');
    if(res.status===404)throw new Error('CNPJ não encontrado.');
    if(!res.ok)throw new Error('Erro ao consultar (HTTP '+res.status+').');
    const data=await res.json();
    const est=data.estabelecimento||{};
    document.getElementById('lFornecedor').value=data.razao_social||'';
    document.getElementById('lFantasia').value=est.nome_fantasia||'';
    document.getElementById('lEndereco').value=est.logradouro||'';
    document.getElementById('lNumero').value=est.numero||'';
    document.getElementById('lBairro').value=est.bairro||'';
    document.getElementById('lCep').value=est.cep||'';
    document.getElementById('lCidade').value=(est.cidade&&est.cidade.nome)||'';
    document.getElementById('lEstado').value=(est.estado&&est.estado.sigla)||'';
    document.getElementById('lTelefone').value=est.ddd1?('('+est.ddd1+') '+(est.telefone1||'')):(est.telefone1||'');
    document.getElementById('lEmail').value=est.email||'';
    toast('Dados do CNPJ carregados ✓');
  }catch(e){
    errEl.textContent=e.message||'Não foi possível consultar. Preencha manualmente.';
  }finally{
    btn.disabled=false;btn.textContent=origLabel;
  }
}
function saveLanc(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const titulo=g('lTitulo'),oc=g('lOc'),ativ=g('lAtiv');
  if(!titulo){toast('Digite o título do lançamento.',true);return;}
  // OC/Atividade não são obrigatórios enquanto o lançamento está "A lançar" — só exige os dois juntos, nunca um sozinho
  if((oc&&!ativ)||(!oc&&ativ)){toast('Preencha a OC e a Atividade juntas, ou deixe as duas em branco.',true);return;}
  if(oc&&ativ){
    const dup=DATA.lancamentos.find(l=>l.numero_oc===oc&&l.numero_atividade===ativ&&l.id!==lancEditId);
    if(dup){toast('Já existe um lançamento com essa OC + Atividade: "'+dup.titulo+'".',true);return;}
  }
  const d={
    titulo,numero_oc:oc,numero_atividade:ativ,
    empreendimento:g('lEmp'),prioridade:g('lPrior'),
    cnpj:g('lCnpj'),fornecedor:g('lFornecedor'),nome_fantasia:g('lFantasia'),
    endereco:g('lEndereco'),numero_endereco:g('lNumero'),bairro:g('lBairro'),cep:g('lCep'),
    forn_cidade:g('lCidade'),forn_estado:g('lEstado'),telefone:g('lTelefone'),email:g('lEmail'),
    banco:g('lBanco'),agencia:g('lAgencia'),conta:g('lConta'),pix:g('lPix'),
    valor:unmaskMoney(g('lValor')),forma_pagamento:g('lForma'),
    parcela_atual:parseInt(g('lParcAtual'))||null,total_parcelas:parseInt(g('lParcTotal'))||null,
    responsavel:g('lResp'),status:g('lStatus'),
    data_solicitacao:g('lDataSol'),data_limite:g('lDataLim'),observacoes:g('lObs'),
    checklist:draftChecklist
  };
  // ter OC+Atividade preenchidas significa que o lançamento já foi lançado — sai de "A lançar" direto pra "Enviado p/ pagadoria"
  let promovido=false;
  if(d.status==='rascunho'&&oc&&ativ){d.status='enviado_pagadoria';promovido=true;}
  let it,ocMudou;
  if(lancEditId){
    it=DATA.lancamentos.find(l=>l.id===lancEditId);
    ocMudou=(it.numero_oc!==oc||it.numero_atividade!==ativ);
    const deStatus=it.status;
    Object.assign(it,d,{requer_atencao:lancDraft.requer_atencao,requer_atencao_motivo:lancDraft.requer_atencao_motivo});
    if(deStatus!==d.status){
      logHistorico(it.id,deStatus,d.status,promovido?'automatico_oc':'manual',
        promovido?'OC/Atividade preenchidos — saiu de "A lançar" automaticamente':'Editado manualmente');
    }

  }else{
    it=Object.assign({id:uid('lan'),created_at:new Date().toISOString(),requer_atencao:lancDraft.requer_atencao,requer_atencao_motivo:lancDraft.requer_atencao_motivo},d);
    DATA.lancamentos.push(it);ocMudou=true;
    if(promovido)logHistorico(it.id,'rascunho','enviado_pagadoria','automatico_oc','OC/Atividade preenchidos ao criar — saiu de "A lançar" automaticamente');

      it.requer_atencao=false;it.requer_atencao_motivo='';

  persist();closeLanc();render();

// ===== PAGADORIA =====
async function xlsxInflate(bytes){
  const ds=new DecompressionStream('deflate-raw');
  const w=ds.writable.getWriter();w.write(bytes);w.close();
  const ab=await new Response(ds.readable).arrayBuffer();return new Uint8Array(ab);
}
function xlsxU16(d,o){return d[o]|(d[o+1]<<8);}
function xlsxU32(d,o){return (d[o]|(d[o+1]<<8)|(d[o+2]<<16)|(d[o+3]<<24))>>>0;}
async function xlsxReadZip(buf){
  const d=new Uint8Array(buf);const files={};
  let i=d.length-22;while(i>=0&&xlsxU32(d,i)!==0x06054b50)i--;
  if(i<0)throw new Error('zip inválido');
  const cdOff=xlsxU32(d,i+16),cdCnt=xlsxU16(d,i+10);let p=cdOff;
  for(let n=0;n<cdCnt;n++){
    if(xlsxU32(d,p)!==0x02014b50)break;
    const method=xlsxU16(d,p+10),nameLen=xlsxU16(d,p+28),extraLen=xlsxU16(d,p+30),commLen=xlsxU16(d,p+32);
    const lho=xlsxU32(d,p+42),compSize=xlsxU32(d,p+20);
    const name=new TextDecoder().decode(d.slice(p+46,p+46+nameLen));
    const lNameLen=xlsxU16(d,lho+26),lExtraLen=xlsxU16(d,lho+28);
    const dataStart=lho+30+lNameLen+lExtraLen;
    const raw=d.slice(dataStart,dataStart+compSize);
    files[name]=method===0?raw:await xlsxInflate(raw);
    p+=46+nameLen+extraLen+commLen;
  }
  return files;
}
function xlsxDec(u8){return new TextDecoder('utf-8').decode(u8);}
function xlsxParseShared(xml){const out=[];const re=/<si>([\s\S]*?)<\/si>/g;let m;
  while((m=re.exec(xml))){const ts=[...m[1].matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]);
    out.push(ts.join('').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#10;/g,'\n').replace(/&#39;/g,"'"));}
  return out;}
function xlsxColNum(ref){let c=0;for(const ch of ref){const u=ch.charCodeAt(0);if(u>=65&&u<=90)c=c*26+(u-64);else break;}return c-1;}
function xlsxParseSheet(xml,shared){const rows=[];const rowRe=/<row[^>]*>([\s\S]*?)<\/row>/g;let rm;
  while((rm=rowRe.exec(xml))){const cells=[];
    const cRe=/<c\b([^>]*)>(?:<v>([\s\S]*?)<\/v>|<is>([\s\S]*?)<\/is>)?<\/c>/g;let cm;
    while((cm=cRe.exec(rm[1]))){
      const attrs=cm[1]||'';
      const rMatch=attrs.match(/r="([A-Z]+)\d+"/);if(!rMatch)continue;
      const tMatch=attrs.match(/t="([^"]+)"/);
      const col=xlsxColNum(rMatch[1]),t=tMatch?tMatch[1]:null,val=cm[2];
      let out;
      if(cm[3]!=null){const it=[...cm[3].matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]).join('');out=it.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#10;/g,'\n').replace(/&#39;/g,"'");}
      else if(val==null)out=null;
      else if(t==='s')out=shared[parseInt(val,10)];
      else out=val;
      cells[col]=out;}
    rows.push(cells);}
  return rows;}
function xlsxSerialToDate(n){const v=Number(n);if(isNaN(v))return n;
  const d=new Date(Date.UTC(1899,11,30)+v*86400000);return d.toISOString().slice(0,10);}

function statusTrigger(atend,mov){
  const a=normText(atend),m=normText(mov);
  if(a==='concluido confirmado'&&m==='recebido')return'programado';
  if(a==='cancelado'||m==='bloqueado'||m==='cancelado')return'atencao';
  return null;
}
// casa um lançamento com a linha correspondente da Pagadoria (por OC+Atividade) e aplica a automação de status.
// usado tanto na importação da planilha quanto ao salvar um lançamento com OC/Atividade novos.
function aplicarAutomacaoPagadoria(lanc,origem){
  const p=(DATA.pagadoria||[]).find(x=>x.oc===lanc.numero_oc&&x.atividade===lanc.numero_atividade);
  const fechado=lanc.status==='pago'||lanc.status==='cancelado';
  if(!p){
    if(!fechado&&lanc.aguardando_aprovacao_de){lanc.aguardando_aprovacao_de='';}
    return null;
  }
  // indicador de quem falta aprovar (ATEND. RESP.) — some sozinho quando o atendimento é concluído ou cancelado
  if(!fechado){
    const atendResolvido=/concluido confirmado|cancelado/.test(normText(p.status_atendimento));
    lanc.aguardando_aprovacao_de=atendResolvido?'':(p.responsavel||'');
  }
  if(fechado)return null;
  const trig=statusTrigger(p.status_atendimento,p.status_movimento);
  const motivoBase='STATUS ATENDIMENTO: "'+p.status_atendimento+'" · STATUS MOVIMENTO: "'+p.status_movimento+'" (OC '+p.oc+'/'+p.atividade+')';
  if(trig==='programado'){
    let mudou=false;
    if(lanc.status!=='pagamento_programado'){
      const de=lanc.status;lanc.status='pagamento_programado';
      logHistorico(lanc.id,de,'pagamento_programado',origem,'Casado com a Pagadoria — '+motivoBase,p.oc,p.atividade);
      mudou=true;
    }
    if(lanc.requer_atencao){lanc.requer_atencao=false;lanc.requer_atencao_motivo='';mudou=true;}
    return mudou?'programado':null;
  }
  if(trig==='atencao'){
    if(!lanc.requer_atencao){
      lanc.requer_atencao=true;lanc.requer_atencao_motivo=motivoBase;
      logHistorico(lanc.id,lanc.status,lanc.status,origem,'Marcado como Requer atenção — '+motivoBase,p.oc,p.atividade);
      return'atencao';
    }
    return null;
  }
  return null;
}
// move lançamentos "Pagamento Programado" há 20+ dias corridos automaticamente para Pago
function checkPagamentoProgramadoExpirado(){
  const agora=Date.now();let movidos=0;
  (DATA.lancamentos||[]).forEach(it=>{
    if(it.status!=='pagamento_programado')return;
    const entradas=(DATA.lancamentos_historico||[]).filter(h=>h.lancamento_id===it.id&&h.para_status==='pagamento_programado');
    if(!entradas.length)return;
    const ultima=entradas.reduce((a,b)=>(a.data>b.data?a:b));
    const dias=(agora-new Date(ultima.data).getTime())/86400000;
    if(dias>=20){
      it.status='pago';
      logHistorico(it.id,'pagamento_programado','pago','automatico_tempo','20 dias corridos desde que entrou em Pagamento Programado (em '+fmtDateTime(ultima.data)+')');
      movidos++;
    }
  });
  if(movidos){persist();toast(movidos+' lançamento(s) movido(s) automaticamente para Pago (20 dias em Pagamento Programado) ✓');}
}
function importPagadoria(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const files=await xlsxReadZip(r.result);
      const shared=files['xl/sharedStrings.xml']?xlsxParseShared(xlsxDec(files['xl/sharedStrings.xml'])):[];
      let sheetKey=Object.keys(files).find(k=>/xl\/worksheets\/sheet1\.xml$/.test(k))||Object.keys(files).find(k=>/xl\/worksheets\/.*\.xml$/.test(k));
      const rows=xlsxParseSheet(xlsxDec(files[sheetKey]),shared);
      if(rows.length<2){toast('Planilha vazia ou ilegível.',true);ev.target.value='';return;}
      const hdr=rows[0].map(h=>(h||'').toString().trim());
      const col=name=>hdr.indexOf(name);
      const ci={
        usuario:col('USUA. CRIAÇÃO'),data:col('DATA LANCAMENTO'),atend:col('STATUS ATENDIMENTO'),
        mov:col('STATUS MOVIMENTO'),colig:col('COLIGADA'),emp:col('EMPREENDIMENTO'),
        forn:col('FORNECEDOR'),cnpj:col('CPF/CNPJ'),ocAtiv:col('ORD. COMPRA / ATENDIMENTO'),hist:col('HISTORICO'),
        dados:col('DADOS_PGTO'),resp:col('ATEND. RESP.'),valor:col('VALOR ORIGINAL Total')
      };
      if(ci.ocAtiv<0){toast('Não achei a coluna "ORD. COMPRA / ATENDIMENTO" na planilha.',true);ev.target.value='';return;}
      const existentes={};(DATA.pagadoria||[]).forEach(p=>existentes[p.oc+'/'+p.atividade]=p);
      let novos=0,atualizados=0,movidos=0,marcados=0,semMatch=0;
      rows.slice(1).forEach(row=>{
        if(!row||!row.length)return;
        const ocAtivRaw=(row[ci.ocAtiv]||'').toString().trim();if(!ocAtivRaw)return;
        const parts=ocAtivRaw.split('/');
        const oc=(parts[0]||'').trim(),ativ=(parts[1]||'').trim();
        if(!oc||!ativ)return;
        const reg={
          oc,atividade:ativ,
          usuario:row[ci.usuario]||'',
          data:ci.data>=0?xlsxSerialToDate(row[ci.data]):'',
          status_atendimento:row[ci.atend]||'',
          status_movimento:row[ci.mov]||'',
          coligada:row[ci.colig]||'',
          empreendimento:row[ci.emp]||'',
          fornecedor:row[ci.forn]||'',
          cnpj:ci.cnpj>=0?(row[ci.cnpj]||'').toString().trim():'',
          historico:row[ci.hist]||'',
          dados_pgto:row[ci.dados]||'',
          responsavel:(row[ci.resp]||'').toString().trim(),
          valor:Number(row[ci.valor])||0
        };
        const key=oc+'/'+ativ;
        if(existentes[key]){Object.assign(existentes[key],reg);atualizados++;}
        else{DATA.pagadoria.push(reg);existentes[key]=reg;novos++;}

        const lanc=DATA.lancamentos.find(l=>l.numero_oc===oc&&l.numero_atividade===ativ);
        if(!lanc){semMatch++;return;}
        const res=aplicarAutomacaoPagadoria(lanc,'automatico_importacao');
        if(res==='programado')movidos++;else if(res==='atencao')marcados++;
      });
      checkPagamentoProgramadoExpirado();
      persist();renderPagadoria();renderLanc();
      toast('Planilha importada: '+novos+' novos, '+atualizados+' atualizados · '+movidos+' movidos p/ Pagamento Programado · '+marcados+' marcados Requer atenção'+(semMatch?' · '+semMatch+' sem lançamento correspondente':''));
    }catch(e){console.error(e);toast('Erro ao ler a planilha. Confira se é o .xlsx correto.',true);}
    ev.target.value='';
  };
  r.readAsArrayBuffer(file);
}

        '<div class="field"><label>Coligada *</label><select id="empColigada"><option value="">Selecione…</option>'+
          (DATA.coligadas||[]).map(c=>'<option value="'+c.id+'" '+((editing&&editing.coligada_id===c.id)?'selected':'')+'>'+esc(c.num+' — '+c.razao)+'</option>').join('')+
        '</select></div>'+
        '<div class="field"><label>Cor</label><input type="color" id="empCor" value="'+fCor+'"></div>'+
        '<button class="btn btn-primary" onclick="saveEmp()">'+(editing?'Salvar':'Adicionar')+'</button>'+
      '</div>'+
      (editing?'<div style="margin-top:8px"><span class="fclear" onclick="cancelEmpEdit()">cancelar edição</span></div>':'')+
    '</div>'+
    '<div class="set-card"><h3>Responsáveis</h3><p class="desc">Quem pode ser responsável por um lançamento.</p>'+
      respRows+
      '<div class="emp-form" style="grid-template-columns:1fr auto">'+
        '<div class="field"><label>Nome do responsável</label><input id="respNome" placeholder="Ex: Victor" onkeydown="if(event.key===\'Enter\')addResp()"></div>'+
        '<button class="btn btn-primary" onclick="addResp()">Adicionar</button>'+
      '</div>'+
    '</div>';
}
function editEmp(id){empEditId=id;renderSettings();}
function cancelEmpEdit(){empEditId=null;renderSettings();}
function saveEmp(){
  const nome=document.getElementById('empNome').value.trim();
  const cidade=document.getElementById('empCidade').value.trim();
  const estado=document.getElementById('empEstado').value.trim();
  const coligada_id=document.getElementById('empColigada').value;
  const colObj=coligadaById(coligada_id);
  const coligada=colObj?colObj.num:'';
  const cor=document.getElementById('empCor').value;
  if(!nome){toast('Digite o nome do empreendimento.',true);return;}
  if(!coligada_id){toast('A coligada é obrigatória.',true);return;}
  const dup=DATA.empreendimentos.find(e=>e.nome===nome&&e.id!==empEditId);
  if(dup){toast('Já existe um empreendimento com esse nome.',true);return;}
  if(empEditId){
    const e=DATA.empreendimentos.find(x=>x.id===empEditId);const oldNome=e.nome;
    Object.assign(e,{nome,cidade,estado,coligada,coligada_id,cor});
    if(oldNome!==nome)DATA.lancamentos.forEach(it=>{if(it.empreendimento===oldNome)it.empreendimento=nome;});
    empEditId=null;toast('Empreendimento salvo ✓');
  }else{
    DATA.empreendimentos.push({id:uid('emp'),nome,cidade,estado,coligada,coligada_id,cor});toast('Empreendimento adicionado ✓');
  }
  persist();renderSettings();
}
function delEmp(id){
  const e=DATA.empreendimentos.find(x=>x.id===id);if(!e)return;
  const usos=DATA.lancamentos.filter(it=>it.empreendimento===e.nome).length;
  if(usos){toast('Não dá pra excluir: usado em '+usos+' lançamento(s).',true);return;}
  if(!confirm('Excluir este empreendimento?'))return;
  DATA.empreendimentos=DATA.empreendimentos.filter(x=>x.id!==id);persist();renderSettings();toast('Excluído ✓');
}
function editCol(id){colEditId=id;renderSettings();}
function cancelColEdit(){colEditId=null;renderSettings();}
function saveCol(){
  const num=document.getElementById('colNum').value.trim();
  const razao=document.getElementById('colRazao').value.trim();
  const cnpj=document.getElementById('colCnpj').value.trim();
  const pag_nome=document.getElementById('colPag').value.trim();
  if(!num){toast('Digite o número da coligada.',true);return;}
  if(!razao){toast('Digite a razão social.',true);return;}
  const dup=(DATA.coligadas||[]).find(c=>c.num===num&&c.id!==colEditId);
  if(dup){toast('Já existe uma coligada com esse número.',true);return;}
  if(colEditId){
    const c=DATA.coligadas.find(x=>x.id===colEditId);Object.assign(c,{num,razao,cnpj,pag_nome});colEditId=null;toast('Coligada salva ✓');
  }else{
    DATA.coligadas.push({id:uid('col'),num,razao,cnpj,pag_nome});toast('Coligada adicionada ✓');
  }
  persist();renderSettings();
}
function delCol(id){
  const vinc=(DATA.empreendimentos||[]).find(e=>e.coligada_id===id);
  if(vinc){toast('Não dá para excluir: vinculada a "'+vinc.nome+'".',true);return;}
  if(!confirm('Excluir esta coligada?'))return;
  DATA.coligadas=DATA.coligadas.filter(c=>c.id!==id);persist();renderSettings();toast('Excluída ✓');
}
function addResp(){
  const nome=document.getElementById('respNome').value.trim();
  if(!nome){toast('Digite o nome do responsável.',true);return;}
  if((DATA.responsaveis||[]).find(r=>r.nome===nome)){toast('Esse responsável já existe.',true);return;}
  DATA.responsaveis.push({id:uid('resp'),nome});persist();renderSettings();toast('Responsável adicionado ✓');
}
function delResp(id){
  const r=DATA.responsaveis.find(x=>x.id===id);if(!r)return;
  if(!confirm('Excluir o responsável "'+r.nome+'"?'))return;
  DATA.responsaveis=DATA.responsaveis.filter(x=>x.id!==id);persist();renderSettings();toast('Excluído ✓');
}

// ===== Exportar / importar backup =====
function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date(),pad=n=>String(n).padStart(2,'0');
  a.href=url;a.download='conviver-pay-backup-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';
  a.click();URL.revokeObjectURL(url);
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const incoming=JSON.parse(r.result);
      if(!confirm('Isso substitui os dados atuais do Conviver Pay pelo conteúdo do arquivo importado (lançamentos, pagadoria, configurações e histórico). Continuar?')){ev.target.value='';return;}
      ['lancamentos','empreendimentos','coligadas','responsaveis','pagadoria','lancamentos_historico'].forEach(k=>{
        DATA[k]=Array.isArray(incoming[k])?incoming[k]:[];
      });
      persist();switchTab(current);
      toast('Dados importados ✓ (sincronizando com o Supabase…)');
    }catch(e){console.error(e);toast('Erro ao ler o arquivo. Confira se é um .json válido.',true);}
    ev.target.value='';
  };
  r.readAsText(file);
}

// ===== Autenticação e carregamento do Supabase =====
function showSetupBanner(){
  document.getElementById('setupBanner').innerHTML=
    '<div class="setup-banner"><span class="ico">⚠</span><div>'+
    '<h3>Configuração pendente</h3>'+
    '<p>Este app ainda não está ligado a um projeto Supabase. Abra <code>index.html</code>, preencha <code>SB_URL</code> e <code>SB_ANON</code> com as chaves do seu projeto (veja <code>SETUP.md</code>) e recarregue a página.</p>'+
    '</div></div>';
}
async function doLogin(){
  if(!SB_CONFIGURED){document.getElementById('loginErr').textContent='Supabase não configurado. Veja SETUP.md.';return;}
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const btn=document.getElementById('loginBtn');const err=document.getElementById('loginErr');
  err.textContent='';
  if(!email||!pass){err.textContent='Preencha e-mail e senha.';return;}
  btn.disabled=true;btn.textContent='Entrando…';
  try{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){err.textContent='E-mail ou senha incorretos.';btn.disabled=false;btn.textContent='Entrar';return;}
    await startApp();
  }catch(e){err.textContent='Erro: '+(e&&e.message?e.message:e);btn.disabled=false;btn.textContent='Entrar';}
}
async function loadFromSupabase(){
  for(const k in SB_TABLES){
    const{data,error}=await sb.from(SB_TABLES[k]).select('*');
    if(error)throw new Error('Tabela "'+SB_TABLES[k]+'": '+error.message);
    DATA[k]=data||[];
  }
  const{data:hist,error:eh}=await sb.from('lancamentos_historico').select('*');
  if(eh)throw new Error('Tabela "lancamentos_historico": '+eh.message);
  DATA.lancamentos_historico=hist||[];
  ['lancamentos','empreendimentos','coligadas','responsaveis','pagadoria','lancamentos_historico'].forEach(k=>{if(!Array.isArray(DATA[k]))DATA[k]=[];});
}
function hideLogin(){const ov=document.getElementById('loginOverlay');ov.classList.remove('show');ov.style.display='none';document.body.classList.remove('pre-auth');}
function showLogin(){const ov=document.getElementById('loginOverlay');document.body.classList.add('pre-auth');ov.style.display='flex';ov.classList.add('show');}
async function startApp(){
  const{data:{session}}=await sb.auth.getSession();
  currentUserEmail=(session&&session.user&&session.user.email)||'';
  await loadFromSupabase();
  canPersist=true;setSave(true);
  checkPagamentoProgramadoExpirado();
  hideLogin();
  try{switchTab('lancamentos');}catch(e){console.error('Render:',e);toast('Aviso ao renderizar: '+(e&&e.message?e.message:e),true);}
}
(async function(){
  if(!SB_CONFIGURED){showSetupBanner();showLogin();document.getElementById('loginErr').textContent='Supabase não configurado. Veja SETUP.md.';return;}
  const loginInput=document.getElementById('loginPass');
  if(loginInput)loginInput.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session){await startApp();}else{showLogin();}
  }catch(e){showLogin();document.getElementById('loginErr').textContent='Erro de conexão: '+(e&&e.message?e.message:e);}
})();
</script>
